name: Purge CDN Cache

on:
  push:
    branches:
      - master
    paths:
      - 'blog/**/*.md'
      - 'project/**/*.md'
      - 'solving/**/*.md'
      - 'about/**/*.md'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.gif'
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Specific file path to purge (e.g. blog/post-url/post.md). Leave empty to purge recently changed files.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Generate posts.json
        run: node generate_index.js

      - name: Commit and push posts.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: Auto-generate posts.json [skip ci]"
            git push
            echo "POSTS_JSON_UPDATED=true" >> $GITHUB_ENV
          else
            echo "No changes in posts.json"
            echo "POSTS_JSON_UPDATED=false" >> $GITHUB_ENV
          fi

      - name: Get changed files
        if: "${{ github.event.inputs.file_path == '' }}"
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: Purge jsDelivr cache
        run: |
          if [ "${{ github.event.inputs.file_path }}" != "" ]; then
            # Manually purge specified file
            echo "Manually purging cache for ${{ github.event.inputs.file_path }}"
            curl -s "https://purge.jsdelivr.net/gh/yymin1022/UsefulBlog_Data@master/${{ github.event.inputs.file_path }}"
          else
            # Purge auto-detected changed files
            for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
              echo "Purging cache for $file"
              curl -s "https://purge.jsdelivr.net/gh/yymin1022/UsefulBlog_Data@master/$file"
            done
            # Always purge posts.json cache if it was updated
            if [ "$POSTS_JSON_UPDATED" = "true" ]; then
              echo "Purging cache for posts.json"
              curl -s "https://purge.jsdelivr.net/gh/yymin1022/UsefulBlog_Data@master/posts.json"
            fi
          fi

